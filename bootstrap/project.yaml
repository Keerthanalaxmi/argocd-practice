apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: nginx-project
  namespace: argocd
spec:
  description: Nginx app project for dev and prod

  sourceRepos:
  - https://github.com/Keerthanalaxmi/argocd-practice.git

  destinations:
  - namespace: dev
    server: https://kubernetes.default.svc
  - namespace: prod
    server: https://kubernetes.default.svc

  clusterResourceWhitelist:
  - group: ''
    kind: Namespace

  namespaceResourceWhitelist:
  - group: 'apps'
    kind: Deployment
  - group: 'batch'
    kind: Job
  - group: ''
    kind: Service
